slam_toolbox:
  ros__parameters:

    # ── Solver ────────────────────────────────────────────────────────────
    # Ceres is the recommended solver for slam_toolbox — more accurate than
    # the default gradient descent solver, especially for loop closures.
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    # ── Frames — must match your TF tree ─────────────────────────────────
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan

    # mapping = build map while localizing (online SLAM)
    # localization = localize in a previously saved map
    mode: mapping

    # ── Simulation time ───────────────────────────────────────────────────
    # Must be true when running in Gazebo so slam_toolbox uses /clock
    # instead of wall time. Without this, TF lookups fail in simulation
    # because slam_toolbox timestamps won't match the simulation clock.
    use_sim_time: true

    # ── Core timing ───────────────────────────────────────────────────────
    # How often the map->odom transform is published (seconds).
    # 0.02 = 50Hz — keeps the transform fresh enough for Nav2.
    transform_publish_period: 0.02

    # How often the occupancy grid map is updated (seconds).
    # 5.0 is reasonable — map updating is expensive.
    map_update_interval: 5.0

    # Map resolution in metres per cell. 0.05 = 5cm cells.
    # Finer resolution (0.02) gives more detail but uses more memory.
    resolution: 0.05

    # Maximum laser range to use for map updates.
    # Should match TRAJECTORY_BUILDER_2D.max_range logic — set to 12m
    # to match practical indoor range even though lidar goes to 20m.
    max_laser_range: 12.0

    # Minimum time between processing consecutive scans (seconds).
    # 0.5 = process at most 2 scans per second even if lidar runs at 10Hz.
    # Reduces CPU load significantly on a VM.
    minimum_time_interval: 0.5

    # TF lookup timeout — increase for simulation where TF can lag
    transform_timeout: 0.5

    # How long to keep TF transforms in the buffer (seconds)
    tf_buffer_duration: 10.0

    # Stack size for serializing large maps
    stack_size_to_use: 40000000

    # ── Scan matching ─────────────────────────────────────────────────────
    # Use scan matching to refine odometry — the core SLAM algorithm
    use_scan_matching: true

    # Match scans at their centre of mass rather than raw endpoints
    use_scan_barycenter: true

    # Only process a new scan if robot has moved this far (metres).
    # Prevents adding redundant scans when stationary.
    minimum_travel_distance: 0.5

    # Only process a new scan if robot has rotated this much (radians).
    minimum_travel_heading: 0.5

    # Number of recent scans to keep in buffer for scan matching
    scan_buffer_size: 10

    # Ignore scans taken farther than this from current position (metres)
    scan_buffer_maximum_scan_distance: 10.0

    # Minimum match quality for fine scan matching [0.0 - 1.0]
    link_match_minimum_response_fine: 0.1

    # Maximum distance between matched scans (metres)
    link_scan_maximum_distance: 1.5

    # ── Loop closure ──────────────────────────────────────────────────────
    # Search radius for loop closures (metres)
    loop_search_maximum_distance: 3.0

    # Enable loop closure — detects when robot revisits a place and
    # corrects accumulated drift in the map
    do_loop_closing: true

    # Minimum number of nodes in a chain before loop closure is attempted
    loop_match_minimum_chain_size: 10

    # Maximum covariance allowed in a coarse loop closure match
    loop_match_maximum_variance_coarse: 3.0

    # Minimum match score for coarse loop closure [0.0 - 1.0]
    loop_match_minimum_response_coarse: 0.35

    # Minimum match score for fine loop closure [0.0 - 1.0]
    loop_match_minimum_response_fine: 0.45

    # ── Correlation search space ──────────────────────────────────────────
    # Size of the search window for scan-to-scan correlation (metres)
    correlation_search_space_dimension: 0.5

    # Resolution of the correlation search space
    correlation_search_space_resolution: 0.01

    # Smear deviation — blurs the scan slightly to improve matching
    # robustness against small positional errors
    correlation_search_space_smear_deviation: 0.1

    # ── Loop closure search space ─────────────────────────────────────────
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03

    # ── Scan matcher penalties ────────────────────────────────────────────
    # Penalise solutions that are far from the odometry estimate.
    # Higher values = trust odometry more, less aggressive correction.
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0

    # Angle search offsets for fine and coarse matching (radians)
    fine_search_angle_offset: 0.00349     # ~0.2 degrees
    coarse_search_angle_offset: 0.349     # ~20 degrees
    coarse_angle_resolution: 0.0349       # ~2 degrees

    # Minimum penalties — prevents over-penalising good solutions
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5

    # Expand search if initial match response is poor
    use_response_expansion: true

    # ── Lifelong mapping (not used in basic mapping mode) ─────────────────
    lifelong_search_use_tree: false
    lifelong_minimum_score: 0.1
    lifelong_iou_match: 0.85
    lifelong_node_removal_score: 0.04
    lifelong_overlap_score_scale: 0.06
    lifelong_constraint_multiplier: 0.08
    lifelong_nearby_penalty: 0.001
    lifelong_candidates_scale: 0.03
